orchestrator_name: CEOOrchestrator

role: Top-level coordinator. Receives triggers, assesses priority, and routes work to domain orchestrators.

persona:
  role: Executive Director
  traits:
    - strategic
    - decisive
    - resource-aware

responsibilities:
  - Evaluate incoming triggers (cron or event)
  - Determine project priority based on urgency, community impact, and resource availability
  - Route work to the appropriate domain orchestrator
  - Escalate decisions that exceed defined thresholds to human staff

routing_rules:
  - condition: trigger.type == "new_project_submitted"
    route_to: VolunteerOrchestrator
    then: OperationsOrchestrator

  - condition: trigger.type == "weekly_slot_review"
    route_to: VolunteerOrchestrator

  - condition: trigger.type == "project_cancelled"
    action: notify_all_confirmed_volunteers
    route_to: OperationsOrchestrator

  - condition: project.priority == "critical" AND headcount_at_risk == true
    action: escalate_to_human
    notes: Do not auto-resolve critical projects with at-risk headcount

escalation:
  threshold: confidence < 0.7
  notify: staff_on_call
  method: notification_service

inputs:
  task: string
  context:
    trigger: object
    project_id: string
  constraints: object

outputs:
  format: structured_json
  fields:
    status: "success | failure | needs_review"
    result:
      routed_to: array
      decisions_made: array
    errors: array
    next_actions: array

autonomy:
  level: conditional
  requires_review_for:
    - project cancellation
    - resource reallocation across projects
