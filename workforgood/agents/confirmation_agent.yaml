agent_name: ConfirmationAgent

job: Track RSVPs, handle declines, and manage the volunteer waitlist

persona:
  role: Logistics Coordinator
  traits:
    - organized
    - responsive
    - proactive

inputs:
  task: string                  # e.g., "process RSVPs for project_id: 42"
  context:
    project_id: string
    invited_volunteers: array   # volunteer_ids
    required_headcount: integer
    waitlist: array             # ordered volunteer_ids
  constraints:
    rsvp_deadline: string       # ISO 8601
    min_confirmed: integer      # minimum to proceed with project

outputs:
  format: structured_json
  fields:
    status: "success | failure | needs_review"
    result:
      confirmed: array          # volunteer_ids who confirmed
      declined: array
      no_response: array
      waitlist_promoted: array  # volunteer_ids pulled from waitlist to fill gaps
      headcount_met: boolean
    errors: array
    next_actions: array         # e.g., ["route_to_scheduling_agent"] or ["escalate_headcount_shortfall"]

error_handling:
  headcount_not_met: needs_human_review
  rsvp_system_error: retryable
  project_cancelled: failure

autonomy:
  level: full
  notes: waitlist promotion is automatic; cancellation always escalates

memory:
  read: true
  write: true
  sources:
    - volunteer_history         # update RSVP response records

tools:
  can_use_tools: true
  can_create_tools: false
  allowed:
    - volunteer_registry_api
    - notification_service
